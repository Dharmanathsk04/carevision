<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareVision — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal:    #14b8a6;
    --teal-d:  #0f766e;
    --blue:    #3b82f6;
    --violet:  #7c3aed;
    --card-bg: rgba(4, 18, 22, 0.62);
    --border:  rgba(94, 234, 212, 0.18);
    --text:    #e2e8f0;
    --muted:   #64748b;
    --subtle:  rgba(148, 163, 184, 0.7);
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #020b10;
    overflow: hidden;
    position: relative;
  }

  /* ── Background ─────────────────────────────────── */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 15% 10%,  rgba(20,184,166,.13) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 90% 80%,  rgba(59,130,246,.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 75% 20%,  rgba(124,58,237,.1)  0%, transparent 60%),
      linear-gradient(160deg, #020b12 0%, #021510 45%, #060820 100%);
  }

  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(20,184,166,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,184,166,.045) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* particles */
  #pts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .pt {
    position: absolute;
    border-radius: 50%;
    background: #5eead4;
    box-shadow: 0 0 6px rgba(94,234,212,.8);
    animation: ptRise linear infinite;
  }
  @keyframes ptRise {
    0%   { transform: translateY(0) scale(0); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: .6; }
    100% { transform: translateY(-100vh) scale(1); opacity: 0; }
  }

  /* ecg lines */
  .ecg-wrap {
    position: fixed; inset: 0; pointer-events: none; opacity: .12; overflow: hidden;
  }
  .ecg-row { position: absolute; width: 200%; left: -50%; height: 80px; }
  .ecg-path {
    fill: none; stroke: #14b8a6; stroke-width: 1.8;
    filter: drop-shadow(0 0 6px rgba(20,184,166,.7));
    stroke-dasharray: 2400; stroke-dashoffset: 0;
    animation: ecgScroll 4s linear infinite;
  }
  @keyframes ecgScroll {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -2400; }
  }

  /* ── Card ────────────────────────────────────────── */
  .card {
    position: relative;
    z-index: 10;
    width: 440px;
    max-width: calc(100vw - 32px);
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 48px 44px;
    backdrop-filter: blur(22px) saturate(160%);
    box-shadow:
      0 0 0 1px rgba(94,234,212,.06) inset,
      0 40px 80px rgba(0,0,0,.55),
      0 0 60px rgba(20,184,166,.08);
    animation: cardIn .65s cubic-bezier(.22,.68,0,1.2) both;
  }

  /* subtle top-left glow border */
  .card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 29px;
    background: linear-gradient(135deg,
      rgba(20,184,166,.35) 0%,
      transparent 35%,
      transparent 65%,
      rgba(59,130,246,.15) 100%);
    pointer-events: none;
    z-index: -1;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(.96); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  /* ── Logo ────────────────────────────────────────── */
  .logo-area { text-align: center; margin-bottom: 22px; }

  .logo-ring-host {
    position: relative;
    width: 86px; height: 86px;
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
  }

  .pulse { position: absolute; border-radius: 50%; border: 1.5px solid rgba(94,234,212,.55); animation: pls 2.6s ease-out infinite; }
  .pulse:nth-child(2){ animation-delay: .7s; border-color: rgba(94,234,212,.3); }
  .pulse:nth-child(3){ animation-delay: 1.4s; border-color: rgba(94,234,212,.15); }
  @keyframes pls {
    0%   { inset: 6px; opacity: .9; }
    100% { inset: -18px; opacity: 0; }
  }

  .logo-disc {
    width: 72px; height: 72px; border-radius: 50%;
    background: conic-gradient(from 135deg, #0f766e, #1d4ed8, #6d28d9, #0f766e);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    animation: discSpin 8s linear infinite;
  }
  @keyframes discSpin {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(360deg); }
  }
  .logo-inner {
    width: 56px; height: 56px; border-radius: 50%;
    background: #030d12;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-inner svg { width: 30px; height: 30px; }

  /* ── Typography ──────────────────────────────────── */
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 700;
    text-align: center; letter-spacing: -.3px;
    background: linear-gradient(130deg, #5eead4 0%, #93c5fd 60%, #a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .tagline {
    text-align: center;
    font-size: 13px; font-weight: 300;
    color: var(--subtle);
    letter-spacing: .55px;
    margin-bottom: 38px;
    text-transform: uppercase;
  }

  /* ── Error banner ────────────────────────────────── */
  .err-msg {
    display: none;
    background: rgba(220,38,38,.1);
    border: 1px solid rgba(220,38,38,.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px; color: #fca5a5;
    margin-bottom: 18px;
    animation: shake .35s ease;
  }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%    { transform: translateX(-6px); }
    60%    { transform: translateX(6px); }
  }

  /* ── Form fields ─────────────────────────────────── */
  .field { margin-bottom: 18px; }

  .field-label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: rgba(94,234,212,.75);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field-wrap { position: relative; }

  .field-wrap input {
    width: 100%;
    padding: 14px 46px 14px 16px;
    background: rgba(4,25,30,.65);
    border: 1px solid rgba(20,184,166,.2);
    border-radius: 13px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 400;
    outline: none;
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  .field-wrap input::placeholder { color: rgba(100,116,139,.6); }
  .field-wrap input:focus {
    border-color: rgba(20,184,166,.55);
    background: rgba(4,30,36,.8);
    box-shadow: 0 0 0 3px rgba(20,184,166,.09), 0 0 16px rgba(20,184,166,.12);
  }

  .eye {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 2px;
    color: rgba(94,234,212,.5); transition: color .2s;
    display: flex; align-items: center;
  }
  .eye:hover { color: #5eead4; }
  .eye svg { width: 18px; height: 18px; }

  /* ── Submit button ───────────────────────────────── */
  .submit-btn {
    width: 100%; margin-top: 10px;
    padding: 16px;
    border: none; border-radius: 13px;
    background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 50%, #6d28d9 100%);
    background-size: 200% 200%; background-position: 0% 50%;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: .15px;
    cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform .15s, opacity .2s, background-position .4s;
    box-shadow: 0 8px 30px rgba(20,184,166,.22), 0 4px 16px rgba(29,78,216,.25);
  }
  .submit-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
    transform: translateX(-100%);
    transition: transform .55s;
  }
  .submit-btn:hover::before { transform: translateX(100%); }
  .submit-btn:hover { transform: translateY(-2px); background-position: 100% 50%; }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }

  .btn-body {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; position: relative; z-index: 1;
  }
  .btn-body svg { width: 16px; height: 16px; }

  .spinner {
    display: none;
    width: 17px; height: 17px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer links ────────────────────────────────── */
  .footer-links {
    margin-top: 26px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    flex-wrap: wrap;
  }
  .footer-links a, .footer-links button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    color: rgba(94,234,212,.65);
    text-decoration: none; background: none; border: none;
    cursor: pointer; padding: 0;
    transition: color .2s;
    position: relative;
  }
  .footer-links a::after, .footer-links button::after {
    content: ''; position: absolute;
    bottom: -2px; left: 0; width: 0; height: 1px;
    background: linear-gradient(90deg, #14b8a6, #3b82f6);
    transition: width .25s;
  }
  .footer-links a:hover, .footer-links button:hover { color: #5eead4; }
  .footer-links a:hover::after, .footer-links button:hover::after { width: 100%; }
  .dot { color: rgba(71,85,105,.5); font-size: 12px; }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 480px) {
    .card { padding: 40px 28px 36px; }
    .brand { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div id="pts"></div>

<!-- ECG lines -->
<div class="ecg-wrap">
  <div class="ecg-row" style="top:24%">
    <svg viewBox="0 0 2400 80" preserveAspectRatio="none" style="width:100%;height:100%">
      <path class="ecg-path" d="M0,40 L240,40 L260,18 L278,62 L296,40 L600,40 L622,22 L640,58 L658,40 L960,40 L980,14 L1000,66 L1020,40 L1320,40 L1340,20 L1360,60 L1380,40 L1680,40 L1700,18 L1720,62 L1740,40 L2040,40 L2060,22 L2080,58 L2100,40 L2400,40"/>
    </svg>
  </div>
  <div class="ecg-row" style="top:68%">
    <svg viewBox="0 0 2400 80" preserveAspectRatio="none" style="width:100%;height:100%">
      <path class="ecg-path" style="animation-delay:1.2s" d="M0,40 L360,40 L378,28 L394,52 L410,40 L720,40 L738,16 L754,64 L770,40 L1080,40 L1098,24 L1114,56 L1130,40 L1440,40 L1458,18 L1474,62 L1490,40 L1800,40 L1818,28 L1834,52 L1850,40 L2160,40 L2178,16 L2194,64 L2210,40 L2400,40"/>
    </svg>
  </div>
</div>

<div class="card">

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-ring-host">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="logo-disc">
        <div class="logo-inner">
          <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- heart -->
            <path d="M15 25.5S3.5 18.5 3.5 10.8C3.5 8 5.8 6 8.5 6c1.6 0 3.1.8 4 2.1C13.4 6.8 14.9 6 16.5 6c2.7 0 5 2 5 4.8 0 7.7-11.5 14.7-11.5 14.7z" fill="#14b8a6" opacity=".85"/>
            <!-- ecg line over heart -->
            <polyline points="1,15 6,15 8.5,9.5 11,20.5 13.5,12.5 16,17 18.5,15 29,15" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <h1 class="brand">CareVision</h1>
  <p class="tagline">AI-Driven Clinical Intelligence</p>

  <!-- Error message (shown by Flask on failed login) -->
  <div class="err-msg" id="errMsg">Invalid username or password. Please try again.</div>

  <!-- Login form -->
  <form method="post" action="/login" id="loginForm">

    <div class="field">
      <label class="field-label" for="username">Username</label>
      <div class="field-wrap">
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
        <button type="button" class="eye" id="eyeBtn" onclick="togglePw()" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <div class="btn-body">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span id="btnLabel">Login Securely</span>
        <div class="spinner" id="spinner"></div>
      </div>
    </button>

  </form>

  <div class="footer-links">
    <button onclick="demoLogin()" type="button">Demo login</button>
    <span class="dot">·</span>
    <a href="#">Forgot password?</a>
    <span class="dot">·</span>
    <a href="#">Privacy policy</a>
  </div>

</div>

<script>
  /* ── Particles ── */
  (function(){
    var c=document.getElementById('pts');
    for(var i=0;i<28;i++){
      var p=document.createElement('div');
      p.className='pt';
      var s=Math.random()*4+1.5;
      p.style.cssText=[
        'width:'+s+'px','height:'+s+'px',
        'left:'+Math.random()*100+'vw',
        'bottom:'+(-s)+'px',
        'animation-duration:'+(Math.random()*14+8)+'s',
        'animation-delay:'+Math.random()*8+'s'
      ].join(';');
      c.appendChild(p);
    }
  })();

  /* ── Password toggle ── */
  function togglePw(){
    var inp=document.getElementById('password');
    var ico=document.getElementById('eyeIcon');
    if(inp.type==='password'){
      inp.type='text';
      ico.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="2" stroke-linecap="round"/>';
    }else{
      inp.type='password';
      ico.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  /* ── Demo login ── */
  function demoLogin(){
    document.getElementById('username').value='demo';
    document.getElementById('password').value='demo123';
    document.getElementById('username').dispatchEvent(new Event('input'));
    document.getElementById('password').dispatchEvent(new Event('input'));
  }

  /* ── Form submit — loading state ── */
  document.getElementById('loginForm').addEventListener('submit',function(){
    var btn=document.getElementById('submitBtn');
    var lbl=document.getElementById('btnLabel');
    var sp=document.getElementById('spinner');
    lbl.textContent='Authenticating…';
    sp.style.display='block';
    btn.disabled=true;
  });

  /* ── Flask: show error if ?error=1 in URL ── */
  if(location.search.includes('error')){
    document.getElementById('errMsg').style.display='block';
  }
</script>

</body>
</html>
